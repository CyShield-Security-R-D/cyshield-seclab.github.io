{{- $title := or .Attributes.title "" -}}
{{- $lang := or .Type "text" -}}
{{- $class := .Attributes.class | default "" -}}
{{- $noline := strings.Contains $class "noline" -}}
<div class="highlight-wrapper{{ if $noline }} noline{{ end }}">
  {{- with $title -}}
    <div class="codeblock-title">
      {{- $title -}}
    </div>
  {{- end -}}
  {{- transform.Highlight .Inner $lang .Options -}}
</div>
